# isolated ci test environment
name: E2E Critical Path Tests

on:
  push:
    branches: [ "main", "feature/step-5-security-docs-tests" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    # step 1: start the entire microservices stack using our compose file
    - name: Start Docker Compose Stack
      # forces the project name to 'spa' so container names match our local environment
      run: docker compose -p spa up -d --build
      
    # step 2: wait for api gateway to be fully ready
    - name: Wait for API Gateway
      run: |
        echo "waiting for gateway..."
        for i in {1..30}; do
          curl -fsS http://localhost:3000/health && exit 0
          sleep 2
        done
        echo "gateway failed to start"
        docker compose logs
        exit 1

    # step 3: give knex a few seconds to finish migrating and seeding products in pg-service
    - name: Wait for database migrations and seeds
      run: sleep 15
        
    # step 4: execute the supertest suite directly inside the gateway container
    - name: Run Supertest E2E Suite
      run: docker exec spa-api-gateway-1 npm run test:e2e
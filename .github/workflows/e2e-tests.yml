# req 13: isolated ci test environment with a dedicated database container
name: E2E Critical Path Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # isolated db container spun up exclusively for tests
    services:
      test-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        
    - name: Install dependencies
      working-directory: ./backend/api-gateway
      run: npm install
      
    - name: Run Supertest E2E Suite
      working-directory: ./backend/api-gateway
      run: npm run test:e2e